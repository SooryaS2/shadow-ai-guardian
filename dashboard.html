<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow AI Guardian</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 400px;
            height: 550px;
            margin: 0;
            overflow: hidden;
            /* Prevent scrollbars in popup */
        }

        .dashboard-card {
            background: #1C1C1E;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .shield-icon {
            font-size: 48px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 15px rgba(50, 215, 75, 0.4));
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #32D74B, #0A84FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 13px;
            color: #8E8E93;
            margin-bottom: 24px;
            max-width: 280px;
            line-height: 1.4;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 11px;
            color: #8E8E93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(50, 215, 75, 0.1);
            color: #32D74B;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(50, 215, 75, 0.2);
            box-shadow: 0 0 15px rgba(50, 215, 75, 0.1);
            margin-bottom: 20px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #32D74B;
            border-radius: 50%;
            box-shadow: 0 0 10px #32D74B;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .admin-link {
            font-size: 12px;
            color: #555;
            text-decoration: none;
            transition: 0.2s;
            padding: 8px;
            border-radius: 6px;
        }

        .admin-link:hover {
            color: #8E8E93;
            background: rgba(255, 255, 255, 0.05);
        }

        .divider {
            height: 1px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="dashboard-card">
        <div class="shield-icon">🛡️</div>
        <h1>Shadow AI Guardian</h1>
        <p class="subtitle">Enterprise Grade AI Protection System</p>

        <div class="status-badge">
            <div class="pulse"></div>
            System Operational
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="stat-scans">0</div>
                <div class="stat-label">Sites Scanned</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-blocks"
                    style="color: #FF453A; text-shadow: 0 0 10px rgba(255,69,58,0.4);">0</div>
                <div class="stat-label">Risks Blocked</div>
            </div>
        </div>

        <div class="divider"></div>

        <a href="admin.html" target="_blank" class="admin-link">Access Admin Portal &rarr;</a>
    </div>
    <script src="dashboard.js"></script>
</body>

</html>
